  <style>
    :root {
      --navy: #05196c;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --cream: #f5f0e8;
      --slate: #8a9bb5;
      --dark: #060d1f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 75% 20%, rgba(5,25,108,0.5) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 15% 80%, rgba(201,168,76,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 4rem;
      animation: fadeDown 0.8s ease both;
    }

    .monogram {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.35);
      background: rgba(5,25,108,0.3);
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold);
      margin: 0 auto 1.6rem;
      position: relative;
    }

    .monogram::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.1);
    }

    .header-tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.3);
      padding: 0.3rem 0.85rem;
      border-radius: 2px;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 0.6rem;
    }

    h1 em {
      font-style: italic;
      color: var(--gold-light);
    }

    .header-sub {
      font-size: 0.88rem;
      color: var(--slate);
      letter-spacing: 0.05em;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.8rem auto 0;
    }

    /* ── CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      width: 100%;
      max-width: 960px;
    }

    .card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 2.2rem 2rem 1.8rem;
      text-decoration: none;
      color: var(--cream);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    }

    .card:nth-child(1) { animation: fadeUp 0.7s 0.2s ease both; }
    .card:nth-child(2) { animation: fadeUp 0.7s 0.28s ease both; }
    .card:nth-child(3) { animation: fadeUp 0.7s 0.36s ease both; }
    .card:nth-child(4) { animation: fadeUp 0.7s 0.44s ease both; }
    .card:nth-child(5) { animation: fadeUp 0.7s 0.52s ease both; }
    .card:nth-child(6) { animation: fadeUp 0.7s 0.60s ease both; }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.35s;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(5,25,108,0.3) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.35s;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(201,168,76,0.3);
      box-shadow: 0 24px 60px rgba(5,25,108,0.45), 0 0 0 1px rgba(201,168,76,0.08);
    }

    .card:hover::before,
    .card:hover::after { opacity: 1; }

    .card-num {
      position: absolute;
      top: 1.4rem;
      right: 1.6rem;
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 700;
      color: rgba(201,168,76,0.05);
      line-height: 1;
      pointer-events: none;
      transition: color 0.35s;
    }
    .card:hover .card-num { color: rgba(201,168,76,0.1); }

    .card-icon {
      font-size: 1.6rem;
      position: relative;
      z-index: 1;
    }

    .card-body {
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 0.5rem;
    }

    .card-desc {
      font-size: 0.84rem;
      line-height: 1.75;
      color: var(--slate);
    }

    .card-footer {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .card-url {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      opacity: 0.65;
      transition: opacity 0.3s;
    }
    .card:hover .card-url { opacity: 1; }

    .card-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 2px;
      font-size: 0.85rem;
      color: var(--slate);
      transition: all 0.3s;
    }
    .card:hover .card-arrow {
      border-color: var(--gold);
      color: var(--gold);
      transform: translate(2px, -2px);
    }

    .card:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* ── QUOTE ── */
    .quote-section {
      margin-top: 3.5rem;
      max-width: 560px;
      text-align: center;
      animation: fadeUp 0.7s 0.56s ease both;
    }
    .quote-divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 1.8rem;
    }
    .quote-icon {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: rgba(201,168,76,0.15);
      line-height: 1;
      margin-bottom: 0.8rem;
    }
    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-style: italic;
      line-height: 1.7;
      color: var(--cream);
      opacity: 0.85;
      transition: opacity 0.4s;
    }
    .quote-author {
      font-size: 0.78rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-top: 1rem;
      opacity: 0.6;
    }
    .quote-refresh {
      background: none;
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--slate);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 2px;
      cursor: pointer;
      margin-top: 1.4rem;
      transition: all 0.3s;
      font-family: 'DM Sans', sans-serif;
    }
    .quote-refresh:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 4rem;
      text-align: center;
      animation: fadeUp 0.7s 0.6s ease both;
    }

    .footer-line {
      width: 40px;
      height: 1px;
      background: rgba(201,168,76,0.2);
      margin: 0 auto 1.2rem;
    }

    .footer-text {
      font-size: 0.76rem;
      color: var(--slate);
      letter-spacing: 0.06em;
    }

    .footer-text a {
      color: var(--gold);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .footer-text a:hover { opacity: 1; }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      .cards { grid-template-columns: 1fr; max-width: 400px; }
      .card { padding: 1.8rem 1.6rem 1.5rem; }
    }
    @media (min-width: 721px) and (max-width: 920px) {
      .cards { grid-template-columns: 1fr 1fr; max-width: 580px; }
    }

<script>
const quotes = [
  { quote: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
  { quote: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
  { quote: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
  { quote: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
  { quote: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
  { quote: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein" },
  { quote: "Do what you can, with what you have, where you are.", author: "Theodore Roosevelt" },
  { quote: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
  { quote: "Your time is limited, don't waste it living someone else's life.", author: "Steve Jobs" },
  { quote: "Everything you've ever wanted is on the other side of fear.", author: "George Addair" },
  { quote: "Hard work beats talent when talent doesn't work hard.", author: "Tim Notke" },
  { quote: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
  { quote: "The only impossible journey is the one you never begin.", author: "Tony Robbins" },
  { quote: "You are never too old to set another goal or to dream a new dream.", author: "C.S. Lewis" },
  { quote: "Strive not to be a success, but rather to be of value.", author: "Albert Einstein" },
  { quote: "I have not failed. I've just found 10,000 ways that won't work.", author: "Thomas Edison" },
  { quote: "The secret of getting ahead is getting started.", author: "Mark Twain" },
  { quote: "It always seems impossible until it's done.", author: "Nelson Mandela" },
  { quote: "Small daily improvements over time lead to stunning results.", author: "Robin Sharma" },
  { quote: "Discipline is choosing between what you want now and what you want most.", author: "Abraham Lincoln" },
  { quote: "The man who moves a mountain begins by carrying away small stones.", author: "Confucius" },
  { quote: "Be so good they can't ignore you.", author: "Steve Martin" },
  { quote: "If you want to go fast, go alone. If you want to go far, go together.", author: "African Proverb" },
];

// Quotes API URL — update this once your Cloudflare Worker is deployed
const QUOTES_API = null; // e.g. 'https://quotes-api.your-worker.workers.dev/random'

function showLocalQuote() {
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('quote-text').textContent = q.quote;
  document.getElementById('quote-author').textContent = '— ' + q.author;
}

async function showRandomQuote() {
  if (!QUOTES_API) return showLocalQuote();
  try {
    const res = await fetch(QUOTES_API);
    const q = await res.json();
    document.getElementById('quote-text').textContent = q.quote;
    document.getElementById('quote-author').textContent = '— ' + q.author;
  } catch {
    showLocalQuote();
  }
}

// ── CARDS ──
const cards = [
  { href: "https://me.akibsaify.in", icon: "📋", title: "Portfolio", desc: "Professional profile, experience & expertise in Legal & Compliance Operations.", url: "me.akibsaify.in" },
  { href: "https://deals.akibsaify.in", icon: "🔥", title: "Deal Drops", desc: "Daily curated deals, discounts & money-saving finds — India's best offers, every day.", url: "deals.akibsaify.in" },
  { href: "https://habits.akibsaify.in", icon: "⚡", title: "HabitStack", desc: "Build better habits, one stack at a time. Track, improve & stay consistent.", url: "habits.akibsaify.in" },
  { href: "https://tools.akibsaify.in", icon: "🧮", title: "Tools", desc: "Free online calculators — EMI, SIP, tax, electricity bill & more. Smart money tools for everyone.", url: "tools.akibsaify.in" },
  { href: "https://akibsaify.wordpress.com", icon: "✍️", title: "Journal", desc: "Poetry, philosophy & life reflections — personal essays on growing up, thinking deeply & finding meaning.", url: "akibsaify.wordpress.com" },
  { href: "https://www.youtube.com/@QuizDropDaily", icon: "🧠", title: "QuizDropDaily", desc: "Daily trivia quizzes as YouTube Shorts — test your knowledge across science, history, sports & more.", url: "youtube.com/@QuizDropDaily" },
];

document.getElementById('cards').innerHTML = cards.map((c, i) =>
  `<a class="card" href="${c.href}" target="_blank" rel="noopener">
    <span class="card-num">${String(i + 1).padStart(2, '0')}</span>
    <div class="card-icon">${c.icon}</div>
    <div class="card-body">
      <div class="card-title">${c.title}</div>
      <div class="card-desc">${c.desc}</div>
    </div>
    <div class="card-footer">
      <span class="card-url">${c.url}</span>
      <span class="card-arrow">↗</span>
    </div>
  </a>`
).join('');

showRandomQuote();
document.getElementById('btn-new-quote').addEventListener('click', showRandomQuote);
</script>
